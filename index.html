<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Truekio</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script>
      window.onerror = function(message, source, lineno, colno, error) {
        var div = document.createElement('div');
        div.style.position = 'fixed';
        div.style.top = '0';
        div.style.left = '0';
        div.style.width = '100vw';
        div.style.height = '100vh';
        div.style.backgroundColor = 'red';
        div.style.color = 'white';
        div.style.padding = '20px';
        div.style.zIndex = '999999';
        div.style.overflow = 'auto';
        div.innerHTML = '<h1>App Crashed</h1><p><b>Msg:</b> ' + message + '</p><p><b>Src:</b> ' + source + ':' + lineno + ':' + colno + '</p><pre>' + (error ? error.stack : 'No stack') + '</pre>';
        document.body.appendChild(div);
        return false;
      };
      window.addEventListener('unhandledrejection', function(event) {
        var div = document.createElement('div');
        div.style.position = 'fixed';
        div.style.top = '0';
        div.style.left = '0';
        div.style.width = '100vw';
        div.style.height = '100vh';
        div.style.backgroundColor = 'darkred';
        div.style.color = 'white';
        div.style.padding = '20px';
        div.style.zIndex = '999999';
        div.style.overflow = 'auto';
        div.innerHTML = '<h1>Unhandled Promise Rejection</h1><p><b>Msg:</b> ' + event.reason + '</p><pre>' + (event.reason && event.reason.stack ? event.reason.stack : '') + '</pre>';
        document.body.appendChild(div);
      });
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
